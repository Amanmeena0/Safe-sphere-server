services: 
  - type: web
    name: safe-sphere-server
    runtime: python
    build_command: pip install -r requirements.txt
    start_command: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: safesphere-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: redis-cache
          property: connectionString

  - type: worker
    name: celery-worker
    runtime: python
    build_command: pip install -r requirements.txt
    start_command: celery -A app.utils.celery_app.celery worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: safesphere-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: redis-cache
          property: connectionString

databases:
  - name: safesphere-db
    databaseName: safesphere
    user: admin

redis:
  - name: redis-cache
    ipAllowList: [] # Only allow internal connections

